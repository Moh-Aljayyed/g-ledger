<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Very light background -->
  <rect width="1200" height="630" fill="#F8FAFC"/>

  <!-- Connection lines -->
  <line x1="600" y1="200" x2="600" y2="75" stroke="#E2E8F0" stroke-width="2"/>
  <line x1="600" y1="200" x2="710" y2="137" stroke="#E2E8F0" stroke-width="2"/>
  <line x1="600" y1="200" x2="710" y2="263" stroke="#E2E8F0" stroke-width="2"/>
  <line x1="600" y1="200" x2="600" y2="325" stroke="#E2E8F0" stroke-width="2"/>
  <line x1="600" y1="200" x2="490" y2="263" stroke="#E2E8F0" stroke-width="2"/>
  <line x1="600" y1="200" x2="490" y2="137" stroke="#E2E8F0" stroke-width="2"/>

  <!-- Center GL -->
  <circle cx="600" cy="200" r="42" fill="#1570C8"/>
  <circle cx="600" cy="200" r="35" fill="#1A7FE0"/>
  <text x="600" y="211" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="24" font-weight="bold">GL</text>

  <!-- Finance -->
  <circle cx="600" cy="68" r="22" fill="#22C55E"/>
  <text x="600" y="105" text-anchor="middle" fill="#64748B" font-family="Arial, sans-serif" font-size="12">Finance</text>

  <!-- Reports -->
  <circle cx="716" cy="132" r="22" fill="#3B82F6"/>
  <text x="716" y="165" text-anchor="middle" fill="#64748B" font-family="Arial, sans-serif" font-size="12">Reports</text>

  <!-- Manufacturing -->
  <circle cx="716" cy="268" r="22" fill="#8B5CF6"/>
  <text x="716" y="301" text-anchor="middle" fill="#64748B" font-family="Arial, sans-serif" font-size="12">Manufact.</text>

  <!-- Inventory -->
  <circle cx="600" cy="332" r="22" fill="#F59E0B"/>
  <text x="600" y="366" text-anchor="middle" fill="#64748B" font-family="Arial, sans-serif" font-size="12">Inventory</text>

  <!-- Payroll -->
  <circle cx="484" cy="268" r="22" fill="#EF4444"/>
  <text x="484" y="301" text-anchor="middle" fill="#64748B" font-family="Arial, sans-serif" font-size="12">Payroll</text>

  <!-- HR -->
  <circle cx="484" cy="132" r="22" fill="#14B8A6"/>
  <text x="484" y="165" text-anchor="middle" fill="#64748B" font-family="Arial, sans-serif" font-size="12">HR</text>

  <!-- Title -->
  <text x="600" y="460" text-anchor="middle" fill="#021544" font-family="Arial, sans-serif" font-size="52" font-weight="bold">GENERAL LEDGER</text>
  <text x="600" y="505" text-anchor="middle" fill="#64748B" font-family="Arial, sans-serif" font-size="22" letter-spacing="4">INTEGRATED ERP SYSTEM</text>

  <!-- URL -->
  <text x="600" y="575" text-anchor="middle" fill="#94A3B8" font-family="Arial, sans-serif" font-size="16" letter-spacing="2">g-ledger.com</text>
