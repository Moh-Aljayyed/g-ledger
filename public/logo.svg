<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- White background -->
  <rect width="512" height="512" fill="white"/>

  <!-- Connection lines from center to modules -->
  <line x1="256" y1="256" x2="256" y2="110" stroke="#D0D5DD" stroke-width="2"/>
  <line x1="256" y1="256" x2="382" y2="183" stroke="#D0D5DD" stroke-width="2"/>
  <line x1="256" y1="256" x2="382" y2="329" stroke="#D0D5DD" stroke-width="2"/>
  <line x1="256" y1="256" x2="256" y2="402" stroke="#D0D5DD" stroke-width="2"/>
  <line x1="256" y1="256" x2="130" y2="329" stroke="#D0D5DD" stroke-width="2"/>
  <line x1="256" y1="256" x2="130" y2="183" stroke="#D0D5DD" stroke-width="2"/>

  <!-- Center GL circle -->
  <circle cx="256" cy="256" r="52" fill="#1570C8"/>
  <circle cx="256" cy="256" r="44" fill="#1A7FE0"/>
  <text x="256" y="268" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="32" font-weight="bold">GL</text>

  <!-- Finance (top) - Green -->
  <circle cx="256" cy="100" r="28" fill="#22C55E"/>
  <text x="256" y="148" text-anchor="middle" fill="#475467" font-family="Arial, sans-serif" font-size="14">Finance</text>

  <!-- Reports (top-right) - Blue -->
  <circle cx="390" cy="175" r="28" fill="#3B82F6"/>
  <text x="390" y="216" text-anchor="middle" fill="#475467" font-family="Arial, sans-serif" font-size="14">Reports</text>

  <!-- Manufacturing (bottom-right) - Purple -->
  <circle cx="390" cy="337" r="28" fill="#8B5CF6"/>
  <text x="390" y="378" text-anchor="middle" fill="#475467" font-family="Arial, sans-serif" font-size="13">Manufact.</text>

  <!-- Inventory (bottom) - Orange -->
  <circle cx="256" cy="412" r="28" fill="#F59E0B"/>
  <text x="256" y="453" text-anchor="middle" fill="#475467" font-family="Arial, sans-serif" font-size="14">Inventory</text>

  <!-- Payroll (bottom-left) - Red -->
  <circle cx="122" cy="337" r="28" fill="#EF4444"/>
  <text x="122" y="378" text-anchor="middle" fill="#475467" font-family="Arial, sans-serif" font-size="14">Payroll</text>

  <!-- HR (top-left) - Teal -->
  <circle cx="122" cy="175" r="28" fill="#14B8A6"/>
  <text x="122" y="216" text-anchor="middle" fill="#475467" font-family="Arial, sans-serif" font-size="14">HR</text>
</svg>
