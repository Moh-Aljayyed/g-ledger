<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Book/Ledger shape -->
  <rect x="96" y="112" width="320" height="288" rx="24" fill="white" fill-opacity="0.12"/>
  <rect x="104" y="120" width="304" height="272" rx="20" stroke="white" stroke-width="6" stroke-opacity="0.35"/>

  <!-- Center spine -->
  <line x1="256" y1="120" x2="256" y2="392" stroke="white" stroke-width="4" stroke-opacity="0.25"/>

  <!-- Left page - ledger lines -->
  <line x1="136" y1="176" x2="228" y2="176" stroke="white" stroke-width="6" stroke-opacity="0.6" stroke-linecap="round"/>
  <line x1="136" y1="220" x2="228" y2="220" stroke="white" stroke-width="6" stroke-opacity="0.5" stroke-linecap="round"/>
  <line x1="136" y1="264" x2="228" y2="264" stroke="white" stroke-width="6" stroke-opacity="0.4" stroke-linecap="round"/>
  <line x1="136" y1="308" x2="200" y2="308" stroke="white" stroke-width="6" stroke-opacity="0.3" stroke-linecap="round"/>

  <!-- Right page - checkmarks -->
  <path d="M288 176 L308 196 L348 156" stroke="#00C9A7" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M288 224 L308 244 L348 204" stroke="#00C9A7" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M288 272 L308 292 L348 252" stroke="#00C9A7" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>

  <!-- Digital pulse at bottom -->
  <path d="M148 356 H208 L232 316 L256 372 L280 340 H364" stroke="#00C9A7" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>

  <!-- Gradient -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#021544"/>
      <stop offset="1" stop-color="#0070F2"/>
    </linearGradient>
  </defs>
