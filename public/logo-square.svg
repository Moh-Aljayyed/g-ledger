<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Very light background -->
  <rect width="512" height="512" fill="#F8FAFC"/>

  <!-- Connection lines -->
  <line x1="256" y1="220" x2="256" y2="90" stroke="#E2E8F0" stroke-width="2"/>
  <line x1="256" y1="220" x2="370" y2="154" stroke="#E2E8F0" stroke-width="2"/>
  <line x1="256" y1="220" x2="370" y2="286" stroke="#E2E8F0" stroke-width="2"/>
  <line x1="256" y1="220" x2="256" y2="350" stroke="#E2E8F0" stroke-width="2"/>
  <line x1="256" y1="220" x2="142" y2="286" stroke="#E2E8F0" stroke-width="2"/>
  <line x1="256" y1="220" x2="142" y2="154" stroke="#E2E8F0" stroke-width="2"/>

  <!-- Center GL -->
  <circle cx="256" cy="220" r="44" fill="#1570C8"/>
  <circle cx="256" cy="220" r="37" fill="#1A7FE0"/>
  <text x="256" y="231" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="26" font-weight="bold">GL</text>

  <!-- Finance -->
  <circle cx="256" cy="82" r="24" fill="#22C55E"/>
  <text x="256" y="122" text-anchor="middle" fill="#64748B" font-family="Arial, sans-serif" font-size="11">Finance</text>

  <!-- Reports -->
  <circle cx="375" cy="148" r="24" fill="#3B82F6"/>
  <text x="375" y="184" text-anchor="middle" fill="#64748B" font-family="Arial, sans-serif" font-size="11">Reports</text>

  <!-- Manufacturing -->
  <circle cx="375" cy="292" r="24" fill="#8B5CF6"/>
  <text x="375" y="328" text-anchor="middle" fill="#64748B" font-family="Arial, sans-serif" font-size="11">Manufact.</text>

  <!-- Inventory -->
  <circle cx="256" cy="358" r="24" fill="#F59E0B"/>
  <text x="256" y="395" text-anchor="middle" fill="#64748B" font-family="Arial, sans-serif" font-size="11">Inventory</text>

  <!-- Payroll -->
  <circle cx="137" cy="292" r="24" fill="#EF4444"/>
  <text x="137" y="328" text-anchor="middle" fill="#64748B" font-family="Arial, sans-serif" font-size="11">Payroll</text>

  <!-- HR -->
  <circle cx="137" cy="148" r="24" fill="#14B8A6"/>
  <text x="137" y="184" text-anchor="middle" fill="#64748B" font-family="Arial, sans-serif" font-size="11">HR</text>

  <!-- Title -->
  <text x="256" y="448" text-anchor="middle" fill="#021544" font-family="Arial, sans-serif" font-size="32" font-weight="bold">GENERAL LEDGER</text>
  <text x="256" y="478" text-anchor="middle" fill="#64748B" font-family="Arial, sans-serif" font-size="16" letter-spacing="3">INTEGRATED ERP SYSTEM</text>
</svg>
